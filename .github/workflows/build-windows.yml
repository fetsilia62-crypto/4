name: Build Windows EXE

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python packages
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Add portable Tesseract OCR
        shell: pwsh
        run: |
          choco install tesseract -y --no-progress
          $tesseractExe = (Get-Command tesseract.exe).Source
          $tesseractDir = Split-Path $tesseractExe
          Copy-Item $tesseractDir "$env:GITHUB_WORKSPACE\tesseract" -Recurse -Force

          $tessdata = "$env:GITHUB_WORKSPACE\tesseract\tessdata"
          New-Item -ItemType Directory -Force -Path $tessdata | Out-Null

          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/tesseract-ocr/tessdata_fast/main/rus.traineddata" `
            -OutFile "$tessdata\rus.traineddata"

          if (-not (Test-Path "$tessdata\eng.traineddata")) {
            Invoke-WebRequest `
              -Uri "https://raw.githubusercontent.com/tesseract-ocr/tessdata_fast/main/eng.traineddata" `
              -OutFile "$tessdata\eng.traineddata"
          }

      - name: Build application
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onedir `
            --windowed `
            --name PassportContract `
            app.py

          Copy-Item `
            "$env:GITHUB_WORKSPACE\tesseract" `
            "$env:GITHUB_WORKSPACE\dist\PassportContract\tesseract" `
            -Recurse -Force

          Copy-Item `
            "$env:GITHUB_WORKSPACE\template_gph.docx" `
            "$env:GITHUB_WORKSPACE\dist\PassportContract\template_gph.docx" `
            -Force

          Copy-Item `
            "$env:GITHUB_WORKSPACE\README.md" `
            "$env:GITHUB_WORKSPACE\dist\PassportContract\README.md" `
            -Force

      - name: Upload Windows program
        uses: actions/upload-artifact@v4
        with:
          name: PassportContract-windows
          path: dist/PassportContract
          if-no-files-found: error
          retention-days: 14
