name: Build Windows EXE

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python packages
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Add portable Tesseract OCR
        shell: pwsh
        run: |
          choco install tesseract -y --no-progress

          # Get-Command usually points to a Chocolatey shim, not to the real
          # Tesseract installation. Copy the actual program directory.
          $candidates = @(
            "$env:ProgramFiles\Tesseract-OCR",
            "${env:ProgramFiles(x86)}\Tesseract-OCR"
          )

          $tesseractDir = $candidates |
            Where-Object { $_ -and (Test-Path (Join-Path $_ "tesseract.exe")) } |
            Select-Object -First 1

          if (-not $tesseractDir) {
            throw "The real Tesseract-OCR installation directory was not found."
          }

          $portableDir = "$env:GITHUB_WORKSPACE\tesseract"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item "$tesseractDir\*" $portableDir -Recurse -Force

          $tessdata = Join-Path $portableDir "tessdata"
          New-Item -ItemType Directory -Force -Path $tessdata | Out-Null

          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/tesseract-ocr/tessdata_fast/main/rus.traineddata" `
            -OutFile (Join-Path $tessdata "rus.traineddata")

          if (-not (Test-Path (Join-Path $tessdata "eng.traineddata"))) {
            Invoke-WebRequest `
              -Uri "https://raw.githubusercontent.com/tesseract-ocr/tessdata_fast/main/eng.traineddata" `
              -OutFile (Join-Path $tessdata "eng.traineddata")
          }

          & (Join-Path $portableDir "tesseract.exe") --version
          & (Join-Path $portableDir "tesseract.exe") --list-langs `
            --tessdata-dir $tessdata

      - name: Build application
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onedir `
            --windowed `
            --name PassportContract `
            app.py

          Copy-Item `
            "$env:GITHUB_WORKSPACE\tesseract" `
            "$env:GITHUB_WORKSPACE\dist\PassportContract\tesseract" `
            -Recurse -Force

          Copy-Item `
            "$env:GITHUB_WORKSPACE\template_gph.docx" `
            "$env:GITHUB_WORKSPACE\dist\PassportContract\template_gph.docx" `
            -Force

          Copy-Item `
            "$env:GITHUB_WORKSPACE\README.md" `
            "$env:GITHUB_WORKSPACE\dist\PassportContract\README.md" `
            -Force

      - name: Upload Windows program
        uses: actions/upload-artifact@v4
        with:
          name: PassportContract-windows
          path: dist/PassportContract
          if-no-files-found: error
          retention-days: 14
